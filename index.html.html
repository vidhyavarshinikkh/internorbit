<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Converter</title>
  <meta name="description" content="Convert Celsius, Fahrenheit and Kelvin instantly.">
  <link rel="stylesheet" href="temp.css">
</head>
<body>

  <header>
    <h1>Temperature Converter</h1>
  </header>

  <main>
    <div class="container">

      <form id="converter" onsubmit="return false;">
        
        <label for="tempInput">Enter Temperature</label>
        <input type="number" id="tempInput" placeholder="e.g. 25" required>

        <label for="unitSelect">Select Unit</label>
        <select id="unitSelect">
          <option value="C">Celsius (°C)</option>
          <option value="F">Fahrenheit (°F)</option>
          <option value="K">Kelvin (K)</option>
        </select>

        <div class="buttons">
          <button type="button" id="convertBtn">Convert</button>
          <button type="reset">Reset</button>
        </div>

      </form>

      <div class="result">
        <p id="result1"></p>
        <p id="result2"></p>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
